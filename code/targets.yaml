
# targets.yaml

version: 1

run:
  viewport:
    width: 1366
    height: 768
  user_agent: "UI-EvidenceBot/1.0 (read-only)"
  wait_until: commit
  timeout_ms: 100000
  settle_ms: 8000              # global fallback settle
  retry_on_large_diff: true
  rate_limit_ms: 1000
  big_diff_threshold: 0.65

auth:
  storage_state: "auth/storage_state.json"

targets:
  - name: "Internal Dashboard"
    slug: "ld-hub74"
    url: "https://time.is/"

    # actions let THIS target dictate how it becomes "ready"
    actions:
      - type: "wait"
        ms: 8000
      - type: "scroll_bottom"
      - type: "wait"
        ms: 4000

    # simple readiness gate (shell presence, not fragile IDs)
    ready:
      selector: "div[role='main']"

    masking:
      selectors:
        - ".user-initials"
        - ".timestamp"

    capture:
      full_page: true
